# IVT Kinetics Analyzer - Conda Environment
#
# Create:  conda env create -f environment.yml
# Update:  conda env update -f environment.yml --prune
# Remove:  conda env remove -n IVT_K
#
# For development tools (pytest, ruff, mypy, etc.) install after creating:
#   pip install -r requirements-dev.txt

name: IVT_K
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # --- Compiled scientific libs (prefer conda-forge builds) ---
  - numpy>=2.3.0
  - scipy>=1.17.0
  - pandas>=3.0.0
  - statsmodels>=0.14.0
  - python-kaleido>=1.2.0

  # --- Everything else via pip (joint resolution) ---
  - pip
  - pip:
      # Web Framework (kept together for pip resolver consistency)
      - flask>=3.1.0
      - flask-wtf>=1.2.0
      - flask-sqlalchemy>=3.1.0
      - dash>=4.0.0
      - plotly>=6.5.0
      - dash-mantine-components>=2.5.0
      - dash-iconify>=0.1.2

      # Database
      - sqlalchemy>=2.0.0
      - alembic>=1.18.0

      # Task Queue
      - huey>=2.6.0

      # Statistical Analysis
      - pymc>=5.27.0
      - pytensor>=2.38.0    # 2.37.0 has einsum bug; 2.38.0 fixes it
      - arviz>=0.23.0

      # PDF Export
      - weasyprint>=68.1
      # Optional: reportlab>=4.0 (enhanced protocol/figure PDF; app falls back without it)

      # NetCDF / Trace Export
      - xarray>=2024.1.0
      - h5netcdf>=1.3.0     # NetCDF backend for xarray
      - h5py>=3.0.0          # Required by h5netcdf's default backend

      # Parallelization
      - joblib>=1.5.0

      # Logging
      - structlog>=25.0.0

      # Excel Support
      - openpyxl>=3.1.0

      # Validation
      - pydantic>=2.12.0

      # Utilities
      - python-dotenv>=1.2.0
